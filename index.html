<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tzu for google map</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <div>
          <h1>Tzu for google map</h1>
          <p class="subtitle">店名支援中英文混用，輸入地址後地圖會顯示迴紋針。</p>
        </div>
        <div class="role">
          <div class="role-row">
            <label class="role-label">角色</label>
            <select id="roleSelect">
              <option value="user" selected>使用者</option>
              <option value="admin">管理員</option>
            </select>
            <span id="roleStatus" class="role-status">尚未登入</span>
          </div>
          <div id="userPane" class="role-pane">
            <input
              id="userName"
              type="text"
              placeholder="使用者帳號"
              autocomplete="username"
            />
            <input
              id="userPassword"
              type="password"
              placeholder="使用者密碼"
              autocomplete="current-password"
            />
            <button id="userLogin" type="button">登入</button>
            <button id="userLogout" type="button" class="ghost">登出</button>
          </div>
        </div>
      </header>

      <section class="panel">
        <form id="pinForm" autocomplete="off">
          <div class="field">
            <label for="name">店名（中英文可混用）</label>
            <input id="name" name="name" type="text" required placeholder="例如：Tzu Coffee / 子午咖啡" />
          </div>
          <div class="field">
            <label for="address">地址</label>
            <input id="address" name="address" type="text" required />
          </div>
          <div class="actions">
            <button id="addBtn" type="submit">新增</button>
            <button id="resetBtn" type="button" class="ghost">清除</button>
            <button id="cancelEditBtn" type="button" class="ghost edit-only">取消編輯</button>
          </div>
        </form>
        <div id="status" class="status" aria-live="polite"></div>
      </section>

      <section id="loginInfoPanel" class="panel login-info">
        <h2>登入資訊</h2>
        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">目前帳號</span>
            <span id="loginInfoUser" class="info-value">尚未登入</span>
          </div>
          <div class="info-item">
            <span class="info-label">登入時間</span>
            <span id="loginInfoTime" class="info-value">—</span>
          </div>
          <div class="info-item">
            <span class="info-label">登入位置</span>
            <span id="loginInfoLocation" class="info-value">—</span>
          </div>
          <div class="info-item">
            <span class="info-label">定位狀態</span>
            <span id="loginInfoStatus" class="info-value">—</span>
          </div>
        </div>
      </section>

      <section id="adminPanel" class="panel admin-panel admin-only">
        <div class="admin-header">
          <h2>使用者管理</h2>
          <p class="subtitle">由管理員開通使用者帳號。</p>
        </div>
        <form id="userForm" class="user-form" autocomplete="off">
          <div class="field">
            <label for="newUserName">使用者帳號</label>
            <input id="newUserName" name="newUserName" type="text" required />
          </div>
          <div class="field">
            <label for="newUserPassword">使用者密碼</label>
            <input
              id="newUserPassword"
              name="newUserPassword"
              type="password"
              required
            />
          </div>
          <div class="actions">
            <button id="createUserBtn" type="submit">開通帳號</button>
          </div>
        </form>
        <table id="userTable">
          <thead>
            <tr>
              <th>序號</th>
              <th>帳號</th>
              <th>狀態</th>
              <th>建立時間</th>
              <th>最後登入</th>
              <th>登入位置</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section class="content">
        <div id="map" class="map"></div>
        <div class="table-wrap">
          <div class="table-header">
            <h2>店家清單</h2>
            <div class="table-actions">
              <button id="exportBtn" type="button" class="ghost">匯出 CSV</button>
              <button id="importBtn" type="button" class="ghost">匯入 CSV</button>
              <button id="clearBtn" type="button" class="danger admin-only">清空全部（管理員）</button>
            </div>
          </div>
          <input id="csvFile" type="file" accept=".csv,text/csv" hidden />
          <table id="storeTable">
            <thead>
              <tr>
                <th>序號</th>
                <th>店名</th>
                <th>地址</th>
                <th>緯度</th>
                <th>經度</th>
                <th>新增時間</th>
                <th class="admin-only">操作</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
